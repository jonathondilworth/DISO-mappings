###
# BERTMap CONFIG
# (requires CUDA)
###

# bert_model: jackaduma/SecBERT
# bert_model: ehsanaghaei/SecureBERT
# bert_model: markusbayer/CySecBERT
bert_model: bert-base-uncased

max_length: 256
num_epochs: 3.0
batch_size_training: 32
batch_size_prediction: 256

mapping_extension_threshold: 0.9
mapping_filtered_threshold: 0.9995

annotation_property_iris:
  - http://www.w3.org/2000/01/rdf-schema#label
  - http://www.w3.org/2004/02/skos/core#prefLabel
